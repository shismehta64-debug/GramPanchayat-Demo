services:
  - type: web
    name: gram-panchayat-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

  - type: web
    name: gram-panchayat-dashboard
    env: node
    rootDir: dashboard
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: gram-panchayat-backend
          envVarKey: RENDER_EXTERNAL_URL
